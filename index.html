<title>Ash Walker — The Road Map</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #D4A843;
    --gold-dim: #9B7A2F;
    --bg: #0F0D0A;
    --bg2: #1A1710;
    --accent: #8B3A1A;
    --text: #F0EBE0;
    --text-dim: #9A9080;
    --card-bg: rgba(15, 13, 10, 0.97);
    --border: rgba(212, 168, 67, 0.2);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'EB Garamond', Georgia, serif; overflow: hidden; }

  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 16.25vw;
    background: url('HEAD.png') left top / cover no-repeat;
    pointer-events: auto; cursor: pointer;
  }
  #header::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
    background: linear-gradient(to bottom, transparent, var(--bg));
  }

  #map { position: fixed; top: 0; left: 0; right: 0; bottom: 0; }

  #legend {
    position: fixed; bottom: 24px; left: 24px; z-index: 100;
    display: flex; flex-direction: column; gap: 8px;
  }
  .legend-item { display: flex; align-items: center; gap: 9px; font-size: 11px; letter-spacing: 0.1em; color: var(--text-dim); font-family: 'Cinzel', serif; text-transform: uppercase; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .marker { width: 12px; height: 12px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.4); cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease; }
  .marker:hover { transform: scale(1.7); z-index: 10; }
  .marker.s1 { background: #D4A843; box-shadow: 0 0 6px rgba(212,168,67,0.5); }
  .marker.s2 { background: #7AAECC; box-shadow: 0 0 6px rgba(122,174,204,0.5); }
  .marker.s3 { background: #8B3A1A; box-shadow: 0 0 6px rgba(139,58,26,0.5); }
  .marker.sfinal { background: #888; box-shadow: 0 0 5px rgba(136,136,136,0.4); }
  .marker.start { width: 14px; height: 14px; background: #A8821F; box-shadow: 0 0 8px rgba(168,130,31,0.7); }
  .marker.start.pulse { animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(168,130,31,0.8); }
    70%  { box-shadow: 0 0 0 12px rgba(168,130,31,0); }
    100% { box-shadow: 0 0 0 0 rgba(168,130,31,0); }
  }
  .marker.active { transform: scale(1.9); }

  #card {
    position: fixed; z-index: 200; width: 22vw; min-width: 260px; max-width: 340px;
    background: var(--card-bg); border: 1px solid var(--border);
    display: none; flex-direction: column; overflow: hidden;
  }
  #card.visible { display: flex; animation: slideIn 0.2s ease; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  #card-cover { width: 100%; aspect-ratio: 1; object-fit: cover; display: none; }
  #card-cover-placeholder {
    width: 100%; aspect-ratio: 1; background: var(--bg2);
    display: flex; align-items: center; justify-content: center;
    border-bottom: 1px solid var(--border);
  }
  #card-cover-placeholder span { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.15em; color: var(--text-dim); text-transform: uppercase; }

  #card-body { padding: 18px 20px 20px; display: flex; flex-direction: column; gap: 9px; }
  #card-chapter { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.2em; color: var(--gold-dim); text-transform: uppercase; }
  #card-title { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; color: var(--gold); line-height: 1.25; letter-spacing: 0.05em; }
  #card-location { font-size: 12px; color: var(--text-dim); letter-spacing: 0.08em; font-style: italic; }
  #card-lore { font-size: 13.5px; line-height: 1.65; color: var(--text); border-top: 1px solid var(--border); padding-top: 10px; margin-top: 2px; }

  #card-links { display: flex; gap: 8px; margin-top: 4px; }
  .card-link {
    flex: 1; padding: 7px 4px; text-align: center;
    font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    text-decoration: none; border: 1px solid var(--border); color: var(--text-dim);
    transition: border-color 0.15s, color 0.15s;
  }
  .card-link:hover { border-color: var(--gold); color: var(--gold); }
  .card-link.disabled { opacity: 0.28; pointer-events: none; }

  #card-close {
    position: absolute; top: 10px; right: 12px;
    background: none; border: none; color: var(--text-dim);
    font-size: 16px; cursor: pointer; line-height: 1; padding: 4px; z-index: 10;
  }
  #card-close:hover { color: var(--gold); }
</style>
</head>

mapboxgl.accessToken = 'pk.eyJ1IjoiYXNoLXdhbGtlciIsImEiOiJjbXFmbGx3bmUwZWthMzJyMWw4MGFqcDl5In0.556EtLH6w0n2MN-r0lXHsA';

const CHAPTERS = [
  {id:1,  season:'s1', title:'Ash & Gone',             location:'Greeneville, Tennessee',    coords:[-82.8310,36.1628], lore:"The house was ash and a single standing chimney. He didn't cry. He went to the garage. The bike was there, under a tarp, waiting.",                                                 yt:'https://youtu.be/tRzjAOA0DXQ', sp:'https://open.spotify.com/track/5GjSpQiKbKcFbJk9Ig5hqb', am:'https://music.apple.com/ua/song/ash-gone/6776528616'},
  {id:2,  season:'s1', title:'Walk My Walk',            location:'I-40, Tennessee',           coords:[-86.7816,36.1627], lore:"No plan. No destination. Just west, and the engine, and the first miles of a road with no end he could see.",                                                                   yt:'https://youtu.be/JT5V-V1z49Q', sp:'https://open.spotify.com/track/7bVNtjvcdkxghZcz3W3NnC', am:'https://music.apple.com/ua/song/walk-my-walk/6776528619'},
  {id:3,  season:'s1', title:'West of the Ashes',       location:'Tennessee / Arkansas border',coords:[-90.0771,35.6729], lore:"First sunrise on the flat side of the country. He exhaled for the first time in days. East was behind him. That was enough.",                                                  yt:'https://youtu.be/AN4CX92DG8k', sp:'https://open.spotify.com/track/4yNIUmxjeFqjs3atB4bTO0', am:'https://music.apple.com/ua/song/west-of-the-ashes/6776528622'},
  {id:4,  season:'s1', title:'Memphis Low',             location:'Beale Street, Memphis',     coords:[-90.0520,35.1390], lore:"Third bourbon in. Blues from every open door. He wasn't running anymore. He was looking for something without a name.",                                                        yt:'https://youtu.be/9B7jxXee3v4', sp:'https://open.spotify.com/track/1x2tq0Z53SAh47FJtkfz5z', am:'https://music.apple.com/ua/song/memphis-low/6776528623'},
  {id:5,  season:'s1', title:"The River Don't Forget", location:'DeSoto Bridge, Mississippi', coords:[-90.0598,35.1536], lore:"The river smelled like that place. He stood until it didn't anymore. Until the Mississippi was just the Mississippi again.",                                                  yt:'https://youtu.be/UV5haLO-aMY', sp:'https://open.spotify.com/track/6pTXPM16RKQGWVPyBUBopo', am:'https://music.apple.com/ua/song/the-river-dont-forget/6776528624'},
  {id:6,  season:'s1', title:'Neon & Dust',             location:'Motel, Arkansas',           coords:[-91.1500,34.7800], lore:"The O in MOTEL blinked on and off all night. He lay down without undressing. Three in the morning he sat on the edge of the bed and stared at nothing. Nightmares travel light.", yt:'https://youtu.be/LLKTqxjvnU4', sp:'https://open.spotify.com/track/0gRaW8J8FpOKUu9hlV2uJt', am:'https://music.apple.com/ua/song/neon-dust/6776528625'},
  {id:7,  season:'s1', title:'Old Dog, New Road',       location:'I-40, Arkansas',            coords:[-93.0500,35.0200], lore:"Passed an old biker with a flat. Drove past. Turned around. They changed the tire without a word. Clyde poured two cups from a thermos — as if he knew someone would stop.",  yt:'https://youtu.be/RX0C0jvUw6o', sp:'https://open.spotify.com/album/1jPWSfsIidqAW6BJDXwTms', am:null},
  {id:8,  season:'s1', title:"Clyde's Gospel",          location:'Roadside, Arkansas',        coords:[-93.9500,35.2800], lore:"Campfire. Clyde talked. Sold the Memphis house after his wife died. Bought the Harley. Rides nowhere specific, takes his time getting there. First real conversation since the war.", yt:'https://youtu.be/Q6dATFOApmw', sp:null, am:null},
  {id:9,  season:'s1', title:'Oklahoma Flatline',       location:'Oklahoma plains',            coords:[-95.1500,35.4200], lore:"The horizon went so far it looked fake. Hours without a thought. Just speed and flat earth and Clyde riding parallel — two small shapes in all that open.",                    yt:'https://youtu.be/nv64s5CKpQs', sp:null, am:null},
  {id:10, season:'s1', title:'She Smelled Like Rain',   location:'Oklahoma highway',           coords:[-96.0800,35.4300], lore:"Rain on hot asphalt. The smell hit him like a door opening. Dana, after a shower, in a life he thought he'd burned through. He kept riding.",                                yt:'https://youtu.be/E13ZuwLh_lw', sp:null, am:null},
  {id:11, season:'s1', title:'Route 66 Renegade',       location:'Route 66, Oklahoma',        coords:[-96.7800,35.4500], lore:"The road opened up and the bike answered. First time the whole trip the riding felt like something other than escape. It felt like itself.",                                   yt:'https://youtu.be/eafcccm-AvM', sp:null, am:null},
  {id:12, season:'s1', title:'Bar Fight Blues',         location:'Oklahoma City',              coords:[-97.5200,35.4700], lore:"He wasn't looking for trouble. When trouble found Clyde, Ash didn't think. Three moves, fast, clean. 'Could've walked away,' Clyde said. 'Yeah,' said Ash.",                yt:'https://youtu.be/HztZgDAdw-g', sp:null, am:null},
  {id:13, season:'s1', title:'Clyde Stays Behind',      location:'Albuquerque, NM',           coords:[-106.6504,35.0844],lore:"Old friend in Albuquerque. Clyde looked at him a long time. Said: you'll find what you're after, even if you don't know what it is. Ash started the engine and left.",      yt:'https://youtu.be/41HYGjVp64g', sp:null, am:null},
  {id:14, season:'s1', title:'High Desert Prayer',      location:'New Mexico desert',          coords:[-107.8000,35.1500], lore:"Alone for the first time since Arkansas. The desert quiet was different — not empty, ceremonial. He cut the engine. Spoke out loud. To his father, or to no one.",          yt:'https://youtu.be/TTuTJUeuixY', sp:null, am:null},
  {id:15, season:'s1', title:'Arizona Burn',            location:'Flagstaff, Arizona',         coords:[-111.6513,35.1983], lore:"A hundred and five in the shade, no shade. The asphalt went soft. He didn't stop. Some things you don't survive — you just endure.",                                       yt:null, sp:null, am:null},
  {id:16, season:'s1', title:'Ghost in the Chrome',     location:'Kingman, Arizona',           coords:[-114.0530,35.2100], lore:"Wiping down the tank at a gas station he thought of his father's hands on the same chrome. Everything else burned. This didn't.",                                           yt:null, sp:null, am:null},
  {id:17, season:'s1', title:'Wanted in Two States',    location:'Nevada',                     coords:[-115.1398,36.1699], lore:"Cash only. No big towns. Eyes in the mirror more than usual. It wasn't exactly a legal situation — but it wasn't exactly his fault either.",                                 yt:null, sp:null, am:null},
  {id:18, season:'s1', title:'Pacific in My Eyes',      location:'Pacific Ocean, California',  coords:[-118.4912,34.0195], lore:"He cut the engine at the edge of the continent. Waves kept coming. No end to the horizon. He'd driven the whole country to get here. He still didn't know why.",           yt:null, sp:null, am:null},

  {id:19, season:'s2', title:'Los Angeles Lied',        location:'Los Angeles',                coords:[-118.2437,34.0522], lore:"The city was loud and indifferent and exactly what it was. He'd expected something. There was nothing to expect.",                                                           yt:null, sp:null, am:null},
  {id:20, season:'s2', title:'Dana',                    location:'Los Angeles — café',         coords:[-118.2600,34.0600], lore:"Through a café window. She was laughing. He decided not to disturb that. Rode away. She heard the engine and turned too late.",                                              yt:null, sp:null, am:null},
  {id:21, season:'s2', title:"Another Man's Sky",       location:'Los Angeles',                coords:[-118.2800,34.0400], lore:"He drank alone and decided she was happy. Across the city she stood on the street watching him go.",                                                                        yt:null, sp:null, am:null},
  {id:22, season:'s2', title:'Boardwalk Sermon',        location:'Venice Beach',               coords:[-118.4695,33.9850], lore:"A homeless preacher said something Ash couldn't shake for weeks. He never went back to find out the man's name.",                                                           yt:null, sp:null, am:null},
  {id:23, season:'s2', title:'The Bartender Knows',     location:'Santa Monica',               coords:[-118.4912,34.0195], lore:"Behind the bar you hear everything. He stopped talking and started listening. Other people's stories were easier to carry than his own.",                                   yt:null, sp:null, am:null},
  {id:24, season:'s2', title:"Vet's Night Out",         location:'Los Angeles',                coords:[-118.2437,34.0700], lore:"A bar full of veterans. Brotherhood and damage in equal measure. He recognized every face without knowing any of their names.",                                              yt:null, sp:null, am:null},
  {id:25, season:'s2', title:'PTSD Lullaby',            location:'Rented room, LA',            coords:[-118.2437,34.0522], lore:"Darkest track of the record. Three in the morning. He didn't sleep. The ceiling had nothing to offer.",                                                                    yt:null, sp:null, am:null},
  {id:26, season:'s2', title:'Small Kindness',          location:'Café, Los Angeles',          coords:[-118.2437,34.0300], lore:"A girl drew his portrait without asking. Handed it to him when she left. He still had it in his jacket months later.",                                                      yt:null, sp:null, am:null},
  {id:27, season:'s2', title:'Criminal Mind (Not Mine)',location:'Los Angeles',                 coords:[-118.2437,34.0800], lore:"They needed a driver. He needed money. He told himself one time. He was wrong about that.",                                                                                 yt:null, sp:null, am:null},
  {id:28, season:'s2', title:'The Drop',                location:'Los Angeles — night',        coords:[-118.3000,34.0522], lore:"One delivery. Last one. He made sure of that.",                                                                                                                             yt:null, sp:null, am:null},
  {id:29, season:'s2', title:'Heat Coming Down',        location:'California highway',         coords:[-117.9190,33.8121], lore:"Red and blue in the mirror. He didn't stop. He'd been running from harder things than cops.",                                                                               yt:null, sp:null, am:null},
  {id:30, season:'s2', title:'Dana Calls',              location:'Motel, California',          coords:[-118.2437,34.0522], lore:"Her number. Unknown to him. He picked up anyway. She said: he's gone. The silence between them was longer than the years.",                                                 yt:null, sp:null, am:null},
  {id:31, season:'s2', title:'Pacific Confession',      location:'Beach, California',          coords:[-118.4695,33.9850], lore:"One honest evening. Everything they'd held back since before the war. The ocean didn't judge.",                                                                             yt:null, sp:null, am:null},
  {id:32, season:'s2', title:"Can't Stay, Can't Go",   location:'Los Angeles',                coords:[-118.2437,34.0522], lore:"He loved her. The road was what he was. He couldn't explain why those two things couldn't live in the same life.",                                                          yt:null, sp:null, am:null},
  {id:33, season:'s2', title:'Ink & Scar',              location:'Tattoo shop, LA',            coords:[-118.2600,34.0600], lore:"The artist asked what he wanted. Ash was quiet a long time. 'Not a phoenix,' he said finally. No explanation.",                                                            yt:null, sp:null, am:null},
  {id:34, season:'s2', title:'The Fire Again',          location:'Motel',                      coords:[-118.2437,34.0400], lore:"News from home. His town. Again. He sat on the edge of the bed and stared at the television until the screen blurred.",                                                    yt:null, sp:null, am:null},
  {id:35, season:'s2', title:'Who Burned My House',     location:'Road east',                  coords:[-110.0000,35.0000], lore:"Not an accident. Not a coincidence. Someone knew when he was coming home. Someone made sure there was nothing to come back to.",                                            yt:null, sp:null, am:null},
  {id:36, season:'s2', title:'Eastbound Fury',          location:'I-40 east',                  coords:[-105.0000,35.2000], lore:"He turned the bike around. Three thousand miles of road in reverse. He knew what he was riding toward now.",                                                                yt:null, sp:null, am:null},
  {id:37, season:'s2', title:"Dana, Don't Wait",        location:'Last call',                  coords:[-97.5164,35.4676],  lore:"Last message. He didn't know if she'd hear it. He said it anyway — to the voicemail, to the highway, to the dark.",                                                       yt:null, sp:null, am:null},

  {id:38, season:'s3', title:'Coming Home Wrong',       location:'Greeneville, Tennessee',     coords:[-82.8310,36.1628],  lore:"Same streets. Wrong town. Or the same town and a different man.",                                                                                                           yt:null, sp:null, am:null},
  {id:39, season:'s3', title:'The Name I Got',          location:'Home town',                  coords:[-82.8400,36.1700],  lore:"He had the name. He sat with it a long time before doing anything with it.",                                                                                               yt:null, sp:null, am:null},
  {id:40, season:'s3', title:'Brother by Blood',        location:'Home town',                  coords:[-82.8500,36.1600],  lore:"Same unit. Same mud. Same fire under different skies. And he burned the house.",                                                                                           yt:null, sp:null, am:null},
  {id:41, season:'s3', title:'War Makes Monsters',      location:'Flashback',                  coords:[-82.8200,36.1750],  lore:"There was a reason. There's always a reason. That doesn't make it right.",                                                                                                 yt:null, sp:null, am:null},
  {id:42, season:'s3', title:'Forgive or Burn',         location:'Church',                     coords:[-82.8350,36.1650],  lore:"He sat in the back pew alone. The choice was real. Both doors were open.",                                                                                                 yt:null, sp:null, am:null},
  {id:43, season:'s3', title:"The Preacher's Son",      location:'Home town',                  coords:[-82.8250,36.1580],  lore:"The man who lit the match had a father who asked God for forgiveness every Sunday. Ash didn't know what to do with that.",                                                 yt:null, sp:null, am:null},
  {id:44, season:'s3', title:"Justice Ain't Clean",     location:'Courthouse',                 coords:[-82.8400,36.1650],  lore:"He acted. Not the way anyone expected. Not the way movies taught.",                                                                                                        yt:null, sp:null, am:null},
  {id:45, season:'s3', title:'Courthouse Steps',        location:'Courthouse',                 coords:[-82.8450,36.1600],  lore:"Witness, not defendant. The law had its version. He had his.",                                                                                                             yt:null, sp:null, am:null},
  {id:46, season:'s3', title:'Clyde Rides Again',       location:'Road',                       coords:[-106.6504,35.0844], lore:"He'd seen it in the news. Drove three days without stopping to get there. Said it like it was nothing.",                                                                  yt:null, sp:null, am:null},
  {id:47, season:'s3', title:'The Grave I Dug',         location:'Cemetery',                   coords:[-82.8300,36.1800],  lore:"Not a metaphor. He stood over a real grave and buried what he could. The wrist tattoo barely visible at the edge of his sleeve.",                                         yt:null, sp:null, am:null},
  {id:48, season:'s3', title:'Dana Finds Him',          location:'Home town',                  coords:[-82.8310,36.1628],  lore:"No invitation. She just came. He opened the door and couldn't say anything for a long time.",                                                                              yt:null, sp:null, am:null},

const s1coords = CHAPTERS.filter(c=>c.season==='s1').map(c=>c.coords);
const s2coords = CHAPTERS.filter(c=>c.season==='s2').map(c=>c.coords);
const s3coords = CHAPTERS.filter(c=>c.season==='s3').map(c=>c.coords);

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [-98, 36.5],
  zoom: 4.8,
  minZoom: 3,
  maxZoom: 14,
  projection: 'mercator'
});

map.on('load', () => {
  const addRoute = (id, coords, color, opacity) => {
    map.addSource(id, {type:'geojson', data:{type:'Feature', geometry:{type:'LineString', coordinates:coords}}});
    map.addLayer({id, type:'line', source:id, paint:{'line-color':color,'line-width':1.5,'line-opacity':opacity,'line-dasharray':[3,2]}});
  };
  addRoute('route-s1', s1coords, '#D4A843', 0.45);
  // addRoute('route-s2' — hidden
  // addRoute('route-s3' — hidden

  let activeMarker = null;

  const markerEls = {};
  CHAPTERS.forEach(ch => {
    if (ch.season !== 's1') return;
    const el = document.createElement('div');
    el.className = `marker ${ch.season}${ch.id === 1 ? ' start pulse' : ''}`;
    markerEls[ch.id] = el;
    el.addEventListener('click', e => {
      e.stopPropagation();
      if (activeMarker) activeMarker.classList.remove('active');
      el.classList.remove('pulse');
      el.classList.add('active');
      activeMarker = el;
      const next = markerEls[ch.id + 1];
      if (next) next.classList.add('pulse');
      openCard(ch, e);
    });
    new mapboxgl.Marker({element:el}).setLngLat(ch.coords).addTo(map);
  });

  map.on('click', () => {
    closeCard();
    if (activeMarker) { activeMarker.classList.remove('active'); activeMarker = null; }
  });
});

const card = document.getElementById('card');
const cardCover = document.getElementById('card-cover');
const cardPlaceholder = document.getElementById('card-cover-placeholder');

function openCard(ch, e) {
  document.getElementById('card-chapter').textContent = `Chapter ${ch.id} — ${seasonLabel(ch.season)}`;
  document.getElementById('card-title').textContent = ch.title;
  document.getElementById('card-location').textContent = ch.location;
  document.getElementById('card-lore').textContent = ch.lore;

  const imgPath = `covers/ch${String(ch.id).padStart(2,'0')}.jpg`;
  cardCover.onload = () => { cardCover.style.display='block'; cardPlaceholder.style.display='none'; };
  cardCover.onerror = () => { cardCover.style.display='none'; cardPlaceholder.style.display='flex'; };
  cardCover.src = imgPath;

  setLink('link-yt', ch.yt);
  setLink('link-sp', ch.sp);
  setLink('link-am', ch.am);

  // Position card near marker, below header
  const headerH = document.getElementById('header').offsetHeight;
  const cardW = Math.max(260, Math.min(340, window.innerWidth * 0.22));
  const cardH = 480;
  const margin = 16;
  const clickX = e.clientX;
  const clickY = e.clientY;

  let left = clickX + margin;
  let top = clickY - cardH / 2;

  // Don't go off right edge
  if (left + cardW > window.innerWidth - margin) left = clickX - cardW - margin;
  // Don't go above header
  if (top < headerH + margin) top = headerH + margin;
  // Don't go off bottom
  if (top + cardH > window.innerHeight - margin) top = window.innerHeight - cardH - margin;

  card.style.left = left + 'px';
  card.style.top = top + 'px';
  card.style.right = 'auto';

  card.classList.add('visible');
}

function setLink(id, url) {
  const el = document.getElementById(id);
  if (url) { el.href=url; el.classList.remove('disabled'); }
  else { el.href='#'; el.classList.add('disabled'); }
}

function closeCard() { card.classList.remove('visible'); }

function seasonLabel(s) {
  return {s1:'Ashes & Asphalt', s2:'Pacific Wounds', s3:'Blood Meridian Blues', sfinal:'The Long Goodbye'}[s]||'';
}

document.getElementById('card-close').addEventListener('click', () => {
  closeCard();
  document.querySelectorAll('.marker.active').forEach(m=>m.classList.remove('active'));
});
</script>
