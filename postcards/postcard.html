<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ash Walker — Greetings from Los Angeles</title>

<!-- GoatCounter (бесплатный счётчик просмотров, без ограничений) -->
<!-- Замени "ashwalker" на свой code (создаётся при регистрации на goatcounter.com) -->
<script data-goatcounter="https://ashwalker.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

<style>
  :root {
    --gold: #D4A843;
    --gold-dim: #9B7A2F;
    --bg: #1A1A1A;
    --brown: #8B4513;
    --cream: #F5F0E8;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 24px 16px;
    background: var(--bg);
    color: var(--cream);
    font-family: 'Georgia', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  .header {
    text-align: center;
    margin-bottom: 20px;
  }

  .header h1 {
    font-family: 'Cinzel', 'Georgia', serif;
    font-size: clamp(20px, 4vw, 32px);
    letter-spacing: 2px;
    color: var(--gold);
    margin: 0 0 6px 0;
  }

  .header p {
    color: var(--cream);
    opacity: 0.7;
    font-size: 14px;
    margin: 0;
    font-style: italic;
  }

  .frame {
    max-width: 100%;
    border: 1px solid var(--gold-dim);
    border-radius: 4px;
    padding: 6px;
    background: #000;
  }

  img {
    display: block;
    max-width: 100%;
    height: auto;
    border-radius: 2px;
    cursor: zoom-in;
  }

  .hint {
    margin-top: 14px;
    font-size: 13px;
    color: var(--cream);
    opacity: 0.55;
    text-align: center;
    max-width: 500px;
  }

  .back {
    margin-top: 28px;
    font-size: 13px;
  }

  .back a {
    color: var(--gold);
    text-decoration: none;
    border-bottom: 1px solid var(--gold-dim);
  }

  .back a:hover {
    color: var(--cream);
  }
</style>
</head>
<body>

  <div class="header">
    <h1>ASH WALKER</h1>
    <p>Chapter 19 — Los Angeles Lied</p>
  </div>

  <div class="frame">
    <img src="postcard-ch19-la.png" alt="Vintage postcard — Ash Walker, Los Angeles" id="postcard">
  </div>

  <p class="hint">Click the image to view at full resolution.</p>

  <div class="back">
    <a href="https://www.youtube.com/@AIshWalker">youtube.com/@AIshWalker</a>
  </div>

<script>
  document.getElementById('postcard').addEventListener('click', function() {
    window.open(this.src, '_blank');
  });
</script>

</body>
</html>
